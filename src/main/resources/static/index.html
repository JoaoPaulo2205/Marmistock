<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarmiStock</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        freezer: '#7dd3fc',
                        leaf: '#34d399',
                        ink: '#09090b'
                    }
                }
            }
        };
    </script>
</head>
<body class="bg-ink text-zinc-100 antialiased">
<div id="app-shell" class="min-h-screen">
    <aside id="sidebar" class="border-b border-zinc-800 bg-zinc-950/95 lg:sticky lg:top-0 lg:h-screen lg:border-b-0 lg:border-r">
        <div class="flex h-20 items-center gap-3 px-5">
            <div class="grid h-11 w-11 place-items-center rounded-lg bg-cyan-400/10 text-cyan-300 ring-1 ring-cyan-400/30">
                <i data-lucide="snowflake" class="h-6 w-6"></i>
            </div>
            <div class="brand-copy">
                <p class="text-lg font-semibold tracking-wide">MarmiStock</p>
                <p class="text-xs uppercase text-zinc-500">meal prep control</p>
            </div>
            <button id="sidebar-toggle" class="icon-btn ml-auto" type="button" title="Recolher menu" aria-label="Recolher menu" aria-controls="sidebar-navigation" aria-expanded="true">
                <i data-lucide="panel-left-close"></i>
            </button>
        </div>

        <nav id="sidebar-navigation" class="flex gap-2 overflow-x-auto px-4 pb-4 lg:block lg:space-y-1 lg:overflow-visible">
            <button class="nav-item" data-view="dashboard"><i data-lucide="layout-dashboard"></i><span>Dashboard</span></button>
            <button class="nav-item" data-view="marmitas"><i data-lucide="package-check"></i><span>Marmitas</span></button>
            <button class="nav-item" data-view="receitas"><i data-lucide="utensils"></i><span>Receitas</span></button>
            <button class="nav-item" data-view="lotes"><i data-lucide="calendar-days"></i><span>Lotes</span></button>
            <button class="nav-item" data-view="categorias"><i data-lucide="tags"></i><span>Categorias</span></button>
            <button class="nav-item" data-view="ingredientes"><i data-lucide="wheat"></i><span>Ingredientes</span></button>
            <button class="nav-item" data-view="locais"><i data-lucide="archive"></i><span>Locais</span></button>
            <button class="nav-item" data-view="consumidores"><i data-lucide="users"></i><span>Consumidores</span></button>
        </nav>

        <div class="hidden px-5 pb-5 lg:absolute lg:bottom-0 lg:block">
            <div class="sidebar-note rounded-lg border border-zinc-800 bg-zinc-900/70 p-4">
                <p class="text-sm font-medium text-zinc-200">PostgreSQL</p>
                <p class="mt-1 text-xs leading-5 text-zinc-500">Schema baseado no modelo de categorias, receitas, lotes, locais e movimentacoes.</p>
            </div>
        </div>
    </aside>

    <main id="main-content" class="min-h-screen min-w-0">
        <header class="sticky top-0 z-10 border-b border-zinc-800 bg-ink/85 px-5 py-4 backdrop-blur">
            <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
                <div>
                    <p id="view-kicker" class="text-xs font-semibold uppercase tracking-[0.22em] text-cyan-300">Estoque</p>
                    <h1 id="view-title" class="text-2xl font-semibold text-white">Dashboard</h1>
                </div>
                <div class="flex items-center gap-2">
                    <div class="relative">
                        <i data-lucide="search" class="pointer-events-none absolute left-3 top-2.5 h-4 w-4 text-zinc-500"></i>
                        <input id="search" class="h-10 w-full rounded-lg border border-zinc-800 bg-zinc-950 pl-9 pr-3 text-sm outline-none ring-cyan-400/40 focus:ring-2 md:w-72" placeholder="Buscar">
                    </div>
                    <button id="refresh" class="icon-btn" title="Atualizar"><i data-lucide="refresh-cw"></i></button>
                </div>
            </div>
        </header>

        <section id="app" class="p-5 lg:p-7"></section>
    </main>
</div>

<div id="toast" class="fixed bottom-5 right-5 hidden max-w-sm rounded-lg border border-zinc-700 bg-zinc-950 px-4 py-3 text-sm text-zinc-100 shadow-2xl"></div>

<script src="/app.js"></script>
</body>
</html>
